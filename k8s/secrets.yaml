---
# GreenThumb Kubernetes Secrets — fill in base64-encoded values before applying
# Generate: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: greenthumb-secrets
type: Opaque
data:
  # echo -n "postgresql+psycopg2://user:pass@host:5432/greenthumb" | base64
  database-url: REPLACE_ME
  # echo -n "your-jwt-secret" | base64
  jwt-secret: REPLACE_ME
