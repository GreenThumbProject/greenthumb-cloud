---
# GreenThumb FastAPI — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenthumb-api
  labels:
    app: greenthumb-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greenthumb-api
  template:
    metadata:
      labels:
        app: greenthumb-api
    spec:
      containers:
        - name: greenthumb-api
          image: your-registry/greenthumb-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: greenthumb-secrets
                  key: database-url
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: greenthumb-api
spec:
  selector:
    app: greenthumb-api
  ports:
    - port: 8000
      targetPort: 8000
