spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # Auth endpoints — handled by Java auth-service
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/auth/**

        # Account endpoints — handled by Java account-service
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://account-service:8082}
          predicates:
            - Path=/accounts/**

        # Admin + Sync endpoints — handled by Python greenthumb-api
        - id: greenthumb-api
          uri: ${GREENTHUMB_API_URL:http://greenthumb-api:8000}
          predicates:
            - Path=/admin/**, /sync/**, /

server:
  port: 80

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
