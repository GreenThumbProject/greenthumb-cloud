# GreenThumb Cloud — Local development Docker Compose
#
# Services:
#   greenthumb-api — FastAPI app (admin + sync routes) → connects to Supabase
#   auth-service   — Java JWT auth microservice        → connects to Supabase
#   account-service— Java account management           → connects to Supabase
#   gateway        — API gateway (routes to correct service)
#
# The cloud database is Supabase (hosted PostgreSQL).
# There is no local db container — configure DATABASE_URL / DB_URL in .env.
#
# Usage:
#   cp .env.example .env   # fill in Supabase credentials
#   docker compose up --build

name: greenthumb-cloud

services:

  # ---- GreenThumb FastAPI ------------------------------------------------
  greenthumb-api:
    build:
      context: ..         # repo root — needs rasp5/greenthumb-models
      dockerfile: cloud/greenthumb-api/Dockerfile
    restart: unless-stopped
    environment:
      # Supabase PostgreSQL connection string (session-mode pooler, port 5432)
      DATABASE_URL:     ${DATABASE_URL}
      AUTH_SERVICE_URL: http://auth-service:8081
      DEV_AUTH_BYPASS:  ${DEV_AUTH_BYPASS:-false}
      # Supabase Storage — used by sync routes to upload Pi photos
      IS_CLOUD:         "true"
      SUPABASE_URL:     ${SUPABASE_URL}
      SUPABASE_KEY:     ${SUPABASE_KEY}
    ports:
      - "8000:8000"

  # ---- Auth Service (Java — Spring Boot) ---------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    restart: unless-stopped
    environment:
      # Supabase JDBC connection string (credentials embedded in URL)
      DB_URL:               ${DB_URL}
      JWT_SECRET:           ${JWT_SECRET}
      ACCOUNT_SERVICE_URL:  http://account-service:8082
    ports:
      - "8081:8081"

  # ---- Account Service (Java — Spring Boot) ------------------------------
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    restart: unless-stopped
    environment:
      # Supabase JDBC connection string (credentials embedded in URL)
      DB_URL:      ${DB_URL}
    ports:
      - "8082:8082"

  # ---- Gateway -----------------------------------------------------------
  gateway:
    build:
      context: ./gateway
    restart: unless-stopped
    depends_on:
      - greenthumb-api
      - auth-service
      - account-service
    environment:
      GREENTHUMB_API_URL:  http://greenthumb-api:8000
      AUTH_SERVICE_URL:    http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
    ports:
      - "80:80"
