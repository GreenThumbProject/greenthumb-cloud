server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the cloud gateway
    location ~ ^/(admin|sync|auth|accounts)/ {
        proxy_pass http://gateway:80;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
